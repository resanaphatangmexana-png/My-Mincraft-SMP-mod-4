plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    // ลบปลั๊กอิน shadow ออกไปเลยครับ เพราะเราจะไม่รวม Library ไว้ในตัวมอดแล้ว
}

group = 'com.mss3'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://jitpack.io" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1" 
    mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    modImplementation "net.fabricmc:fabric-loader:0.18.4" // ปรับตามเวอร์ชันที่เราใช้ใน Launcher
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"

    // ✅ เพิ่มตัวนี้เพื่อให้ Mod เรียกใช้ Kotlin จากข้างนอก
    modImplementation "net.fabricmc:fabric-language-kotlin:1.13.11+kotlin.2.3.21"
}

// ✅ ใช้ Java 22 ตามที่ลงไว้ในเครื่อง
java { toolchain { languageVersion = JavaLanguageVersion.of(22) } }

// ❌ ลบส่วน shadowJar และการตั้งค่า remapJar ที่เกี่ยวกับ shadow ออกให้หมด
// ใช้ค่ามาตรฐานของ Fabric Loom แทน

tasks.withType(JavaCompile).configureEach {
    it.options.release = 22
}

processResources {
    inputs.property "version", project.version
    filteringCharset = "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
