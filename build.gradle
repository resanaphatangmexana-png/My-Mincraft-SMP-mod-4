plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT' // แก้ปัญหา Unsupported unpick version
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.mss3'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://jitpack.io" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1" 
    mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.0"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1" // รองรับ 1.21.11
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

shadowJar {
    configurations = [project.configurations.modImplementation]
    archiveClassifier.set('shadow')
}

remapJar {
    dependsOn shadowJar
    inputFile.set(shadowJar.archiveFile)
    archiveFileName = "Mss3-Mod-v1.jar" // ไฟล์นี้จะมีขนาดประมาณ 4.5 MB
}

jar {
    archiveClassifier.set('thin')
}
