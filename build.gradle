plugins {
    id 'fabric-loom' version '1.8-SNAPSHOT'
    id 'com.github.johnrengelman.shadow' version '8.1.1' // เพิ่ม plugin สำหรับรวมไฟล์ (Shadow)
}

group = 'com.mss3'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://jitpack.io" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings "net.fabricmc:yarn:1.21.1+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
    
    // หากคุณมีการใช้ Library อื่นๆ ให้ใช้ shadow แทน implementation เพื่อให้รวมเข้าไปในไฟล์ 4MB
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// ส่วนสำคัญที่ทำให้ไฟล์มีขนาดใหญ่และใช้งานได้จริง
shadowJar {
    configurations = [project.configurations.shadow]
    archiveClassifier.set('shadow')
}

remapJar {
    dependsOn shadowJar
    inputFile.set(shadowJar.archiveFile)
    archiveFileName = "Mss3-Mod-v1.jar" // ชื่อไฟล์ที่คุณต้องการ
}

jar {
    archiveClassifier.set('thin')
}
