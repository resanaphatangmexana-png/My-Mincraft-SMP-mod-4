plugins {
    // ใช้เวอร์ชัน 1.7 ซึ่งเสถียรกว่าสำหรับการรองรับข้ามเวอร์ชันในบางกรณี
    id 'fabric-loom' version '1.7-SNAPSHOT' 
}

group = 'com.mss3'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21) 
    }
}

dependencies {
    // กลับไปใช้ฐานเป็น 1.21 เพื่อความเสถียรในการ Build (แต่ยังเล่นบน 1.21.11 ได้)
    minecraft "com.mojang:minecraft:1.21"
    mappings "net.fabricmc:yarn:1.21+build.2:v2" 
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21"
}

jar {
    archiveFileName = "Mss3-Mod-v1.jar"
}
