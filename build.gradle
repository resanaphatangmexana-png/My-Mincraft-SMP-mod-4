plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT' // ต้องมีบรรทัดนี้เพื่อให้ระบบรู้จักการบิลด์ mod
}

group = 'com.mss3'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21) // Minecraft 1.21.4 บังคับใช้ Java 21
    }
}

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

dependencies {
    // บรรทัดพวกนี้สำคัญมาก ถ้าไม่มีจะเกิด Error "package RegistryWrapper does not exist"
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.112.0+1.21.4"
}

jar {
    archiveFileName = "Mss3-Mod-v1.jar"
}
