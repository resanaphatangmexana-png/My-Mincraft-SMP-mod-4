plugins {
    id 'java'
}

group = 'com.mss3'
version = '1.0.0'

// ตั้งค่าให้ใช้ Java 21 ตามที่ Minecraft 1.21.4 ต้องการ
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // ใส่ library พื้นฐานที่จำเป็น
    implementation 'org.jetbrains:annotations:24.1.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

jar {
    // ตั้งชื่อไฟล์ที่จะดาวน์โหลด
    archiveFileName = "Mss3-Mod-v1.jar"
}
