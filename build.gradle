plugins {
    id 'java'
}

group = 'com.mss3'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21) // ใช้ Java 21 ตามมาตรฐาน 1.21.4
    }
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" } // แหล่งเก็บข้อมูล Library ของ Minecraft
}

dependencies {
    // ดึง Library พื้นฐานที่จำเป็นสำหรับ Minecraft 1.21.4
    implementation 'net.fabricmc:fabric-loader:0.16.9'
    implementation 'org.jetbrains:annotations:24.1.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

jar {
    archiveFileName = "Mss3-Mod-v1.jar" // ชื่อไฟล์ที่คุณจะได้โหลด
}
