plugins {
    id 'fabric-loom' version '1.8-SNAPSHOT'
    id 'com.github.johnrengelman.shadow' version '8.1.1' // ปลั๊กอินสำคัญสำหรับรวมไฟล์
}

group = 'com.mss3'
version = '1.0.0'

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://jitpack.io" }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11" // เปลี่ยนจาก 1.21.1 เป็น 1.21.11
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2" // ตรวจสอบเวอร์ชัน Yarn ล่าสุดสำหรับ 1.21.11
    modImplementation "net.fabricmc:fabric-loader:0.16.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.4+1.21.11" // ใช้ตัวเดียวกับในเครื่องคุณ
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// ตั้งค่าการบิลด์ไฟล์ Shadow Jar (ไฟล์ที่จะมีขนาด 4MB+)
shadowJar {
    configurations = [project.configurations.shadow]
    archiveClassifier.set('shadow-dev')
}

remapJar {
    dependsOn shadowJar
    inputFile.set(shadowJar.archiveFile)
    archiveFileName = "Mss3-Mod-v1.jar" // ชื่อไฟล์ที่คุณต้องการใช้
}

jar {
    archiveClassifier.set('thin')
}
